
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    background:#111111;
    color:#f2f2f2;
}

/* Top Bar */
.navbar{
    height:70px;
    background:#1b1b1b;
    color:#d6d6d6;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    font-weight:bold;
    border-bottom:1px solid #333;
    box-shadow:0 2px 12px rgba(0,0,0,0.25);
}

/* Main Layout */
.container{
    display:flex;
    height:calc(100vh - 70px);
}

/* Left Section */
.left{
    flex:3;
    background:#171717;
    padding:24px;
    border-right:1px solid #333;
    overflow-y:auto;
}

.left h2{
    margin-bottom:20px;
    color:#f2f2f2;
}

/* Todos will be added here */
#todo-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

/* Example todo style */
.todo{
    background:#1f1f1f;
    padding:12px 16px;
    border-radius:8px;
    border:1px solid #333;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
}

/* Right Section */
.right{
    flex:1;
    background:#111111;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:20px;
}

/* Buttons */
button{
    width:200px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#3f4a3c;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.25s;
}

button:hover{
    background:#4f5d4b;
    transform:translateY(-1px);
}
</style>


</head>
<body>

    <div class="navbar">
        Welcome To Todo App
    </div>

    <div class="container">

        <!-- Left Section -->
        <div class="left">
            <h2>Your Todos</h2>

            <div id="todo-list">
                <!-- Todos will be inserted here using DOM -->
            </div>
        </div>

        <!-- Right Section -->
        <div class="right">

            <button id="create-btn">
                Create Todo
            </button>

            <button id="update-btn">
                Update Todo
            </button>

            <button id="delete-btn">
                Delete Todo
            </button>

        </div>

    </div>

</body>
</html>
