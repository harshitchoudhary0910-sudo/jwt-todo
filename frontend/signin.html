<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <script>

    async function signin(){
        const username=document.getElementById("username").value;
        const password=document.getElementById("password").value;
        try{
            const response=await fetch("/signin",{
                method:"POST",
                headers:{
                    "Content-Type": "application/json"
                },
                body:JSON.stringify({
                    "username":username,
                    "password":password
                })
            });
            const data=await response.json();
            // const token = data.token;
            // localStorage.setItem("token", token);
             if(response.ok){
                window.location = '/main'     
              }
        }
        catch(err){
            console.log(err);
        }
    }
    </script>
    

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#111111;
        }

        .container{
            background:#1b1b1b;
            padding:32px;
            width:350px;
            border-radius:10px;
            border:1px solid #333;
            box-shadow:0 10px 28px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            margin-bottom:22px;
            color:#f2f2f2;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:1px solid #444;
            border-radius:8px;
            background:#242424;
            color:#f2f2f2;
        }

        input:focus{
            outline:none;
            border-color:#777;
            box-shadow:0 0 0 3px rgba(255,255,255,0.08);
        }

        button{
            width:100%;
            padding:10px;
            background:#3f4a3c;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#4f5d4b;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Sign In</h2>

    
        <input
            type="text"
            id="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button onclick="signin()">Sign In</button>
    
</div>

</body>
</html>
