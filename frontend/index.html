<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#111111;
            color:#f2f2f2;
        }

        /* Navbar */
        nav{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:18px 60px;
            background:#1b1b1b;
            box-shadow:0 2px 12px rgba(0,0,0,0.25);
        }

        .logo{
            font-size:28px;
            font-weight:bold;
            color:#d6d6d6;
        }

        .nav-buttons button{
            padding:10px 18px;
            margin-left:10px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:15px;
            transition:0.3s;
        }

        .signin{
            background:#1b1b1b;
            border:1px solid #555;
            color:#e6e6e6;
        }

        .signin:hover{
            background:#333;
            color:white;
        }

        .signup{
            background:#3f4a3c;
            color:white;
        }

        .signup:hover{
            background:#4f5d4b;
        }

        /* Hero Section */
        .hero{
            height:80vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:20px;
        }

        .hero h1{
            font-size:52px;
            margin-bottom:20px;
        }

        .hero p{
            font-size:20px;
            color:#b8b8b8;
            margin-bottom:30px;
            max-width:600px;
        }

        .hero button{
            padding:14px 28px;
            font-size:18px;
            border:none;
            background:#3f4a3c;
            color:white;
            border-radius:8px;
            cursor:pointer;
            transition:0.3s;
        }

        .hero button:hover{
            background:#4f5d4b;
        }
    </style>

</head>
<body>

    <nav>
        <div class="logo">TodoApp</div>

        <div class="nav-buttons">
            <button onclick="window.location.href='/signin'" class="signin" >Sign In</button>
            <button onclick="window.location.href='/signup'" class="signup">Sign Up</button>
        </div>
    </nav>

    <section class="hero">
        <h1>Organize Your Tasks Effortlessly</h1>
        <p>
            A simple and clean Todo application to manage your daily tasks,
            stay productive, and achieve your goals.
        </p>

        <button onclick="window.location.href='/signup'" class="signup">Get Started</button>
    </section>

</body>
</html>
